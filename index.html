<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포토 카드 배틀 - V35 배포 안정화 에디션</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="login-overlay">
        <h1 style="font-size: 2.2rem; color: #ff006e; font-style: italic; margin-bottom: 10px;">초강력 멀티 배틀</h1>
        <p style="color:#aaa; font-size:0.9rem; margin-bottom:30px;">V35: 배포 최적화 & 완벽 생태계!</p>
        <button class="google-btn" onclick="window.loginWithGoogle()">🌐 Google 계정 연동</button>
        <button class="guest-btn" onclick="window.loginAsGuest()">📱 기기 연동 (게스트 시작)</button>
    </div>

    <div id="notification-banner" onclick="window.clearNotification()"></div>

    <header id="main-header">
        <div style="font-weight: bold; font-size: 1rem; width: 100%; display:flex; justify-content:space-between; align-items:center; margin-bottom: 5px;">
            <div>👑 <span id="player-name">유저</span>님의 덱</div>
            <button onclick="window.logout()" style="background:#555; padding:5px 10px; font-size:0.75rem;">로그아웃</button>
        </div>
        <div class="stats-bar" style="width: 100%;">
            <div class="money">💰 <span id="money">1000</span></div>
            <div style="color:#00f2ff; font-size: 0.85rem;">🛡️<span id="potion-count">0</span></div>
            <div style="color:#ff3366; font-size: 0.85rem;">💊<span id="atk-potion-count">0</span></div>
            <button class="chat-btn" onclick="window.openChat()" style="background:#004d40; border-color:#009688;">💬 채팅</button>
            <button class="mail-btn" onclick="window.openMailbox()">📬 우편 <span id="mail-badge" class="mail-badge">N</span></button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="window.switchTab(0)">상점</div>
        <div class="tab" onclick="window.switchTab(1)">컬렉션</div>
        <div class="tab" onclick="window.switchTab(2)">합성</div>
        <div class="tab" onclick="window.switchTab(3)" style="color:#00f2ff;">🤖AI</div>
        <div class="tab" onclick="window.switchTab(4)" style="color:#ff006e;">🔥PvP</div>
        <div class="tab" onclick="window.switchTab(5)" style="color:#8338ec;">탐험</div>
        <div class="tab" onclick="window.switchTab(6)" style="color:#ffea00;">🏆특수</div>
        <div class="tab" id="tab-gm" onclick="window.switchTab(7)" style="display:none; background:#ff00e5; color:white; font-weight:900;">👑GM</div>
    </div>

    <div id="section-0" class="section active">
        <div class="gacha-box" style="border-color: #ffea00;">
            <h2 style="font-size: 1.2rem; margin-top:0;">🎁 영웅 뽑기 (51종)</h2>
            <div style="background:#000; padding:10px; border-radius:8px; margin-bottom:12px; border:1px solid #333;">
                <label style="color:#ffea00; font-weight:bold; display:block; margin-bottom:5px; font-size:0.85rem;">✨ SSS 확률강화권 (보유: <span id="rateup-cnt">0</span>장)</label>
                <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
                    <button onclick="window.adjustRateUp(-1)" style="background:#333; padding:5px 12px;">-</button>
                    <input type="number" id="use-rate-up" min="0" value="0" readonly style="width:40px; text-align:center; background:#000; color:#fff; border:1px solid #555; padding:6px; font-size:1rem; border-radius:4px;">
                    <button onclick="window.adjustRateUp(1)" style="background:#333; padding:5px 12px;">+</button>
                </div>
                <div style="color:#26ff00; margin-top:5px; font-size:0.8rem; font-weight:bold;">(SSS 확률 +<span id="rateup-pct">0</span>%)</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="window.pullGacha(1)" style="flex:1; padding:12px; background:#444;">1회 뽑기<br>(100G)</button>
                <button onclick="window.pullGacha(10)" style="flex:2; padding:12px; background:#ffea00; color:#000; font-size:1.1rem;">✨ 10회 연속 뽑기<br>(1000G)</button>
            </div>
        </div>
        <div class="gacha-box" style="border-color: #00f2ff; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;">
            <button onclick="window.buyItem('shield', 200)" style="background: #00f2ff; color: #000; flex: 1 1 30%; font-size:0.8rem;">🛡️방어약(200)</button>
            <button onclick="window.buyItem('attack', 300)" style="background: #ff3366; flex: 1 1 30%; font-size:0.8rem;">💊강화제(300)</button>
            <button onclick="window.buyItem('scroll', 300)" style="background: #ff9800; flex: 1 1 30%; font-size:0.8rem;">✨부적(300)</button>
            <button onclick="window.buyItem('capture', 4000)" style="background: #ff00e5; flex: 1 1 45%; font-size:0.8rem;">🪤AI포획(4k)</button>
            <button onclick="window.buyItem('skip', 1500)" style="background: #fff; color:#000; flex: 1 1 45%; font-size:0.8rem;">⏩스킵권(1.5k)</button>
            <button onclick="window.buyItem('rateup', 1000)" style="background: #ffea00; color:#000; flex: 1 1 100%; font-size:0.85rem;">✨ SSS 확률강화권 구매 (1000G)</button>
        </div>
    </div>

    <div id="section-1" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="font-size: 1.1rem; margin:0;">🗂️ 내 덱 (<span id="card-count">0</span>장)</h2>
            <button id="sell-mode-btn" onclick="window.toggleSellMode()" style="background:#444; padding:6px 10px; font-size:0.8rem;">선택 판매: OFF</button>
        </div>
        <div id="sell-actions" style="display:none; background:#ff3366; padding:10px; border-radius:8px; margin-bottom:10px;">
            <span style="font-size:0.8rem; font-weight:bold;">선택: <span id="sel-sell-cnt">0</span>장</span>
            <button onclick="window.execSelectSell()" style="background:#000; color:#ff3366; margin-left:10px; padding:5px 15px;">선택 팔기</button>
        </div>
        <div style="display:flex; justify-content:center; gap:5px; margin-bottom:10px;">
            <button onclick="window.bulkSell('C')" style="background:#555; padding:8px; font-size:0.8rem; flex:1;">C 일괄판매</button>
            <button onclick="window.bulkSell('B')" style="background:#ff9800; padding:8px; font-size:0.8rem; flex:1;">B 일괄판매</button>
            <button onclick="window.bulkSell('A')" style="background:#26ff00; padding:8px; font-size:0.8rem; color:#000; flex:1;">A 일괄판매</button>
        </div>
        <div class="grid" id="my-deck-grid"></div>
    </div>

    <div id="section-2" class="section">
        <h2 style="font-size: 1.1rem; margin-top:0;">🧪 카드 합성소</h2>
        <div style="display:flex; justify-content:center; gap:8px; align-items:center; margin: 15px 0;">
            <div id="fusion-slot1" class="pvp-slot" onclick="window.openCardSelector('fusion', 1)"><div class="slot-add-icon">+</div>재료1</div>
            <div style="font-size: 1.5rem; font-weight: bold; color:#555;">+</div>
            <div id="fusion-slot2" class="pvp-slot" onclick="window.openCardSelector('fusion', 2)"><div class="slot-add-icon">+</div>재료2</div>
        </div>
        <div style="display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom:15px;">
            <button onclick="window.executeFusion(false)" style="background:#555; flex: 1;">수동 합성</button>
            <button onclick="window.executeFusion(true)" style="background:#ff9800; flex: 1;">✨ 부적 합성(+25%)</button>
        </div>
        <button onclick="window.batchFusion()" style="background:#4CAF50; width: 100%;">⚡ 일괄 자동 합성 시작 (+20% 확률업)</button>
    </div>

    <div id="section-3" class="section"> </div>
    <div id="section-4" class="section"> </div>
    <div id="section-5" class="section"> </div>
    <div id="section-6" class="section"> </div>

    <div id="section-7" class="section">
        <h2 style="font-size: 1.5rem; margin-top:0; color:#ff00e5;">🛠️ 개발자(GM) 콘솔</h2>
        <button onclick="window.openGmUserList()" style="background:#009688; width: 100%; padding:12px; margin-bottom:10px;">전체 유저 DB & 접속 확인 🔍</button>
        <button onclick="window.applyGmBuff()" style="background:#ffea00; color:#000; width:100%; padding:15px; font-size:1.1rem;">⚡ GM 무한 버프 (100만 골드)</button>
    </div>

    <div id="zoom-modal" class="modal-overlay" onclick="window.closeModal('zoom-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="zoom-container"></div>
            <div id="zoom-actions"></div>
            <button onclick="window.closeModal('zoom-modal')" style="background:#555; width:100%; margin-top:15px;">닫기</button>
        </div>
    </div>

    <div id="card-select-modal" class="modal-overlay" onclick="window.closeModal('card-select-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="card-select-title" style="margin-top:0;">장착할 카드 선택</h3>
            <div id="selector-grid" class="grid"></div>
            <button onclick="window.closeModal('card-select-modal')" style="background:#555; width:100%; margin-top:15px;">취소</button>
        </div>
    </div>

    <div id="global-chat-modal" class="modal-overlay" onclick="window.closeModal('global-chat-modal')">
        <div class="modal-content" style="max-width:450px;" onclick="event.stopPropagation()">
            <h3 style="margin:0 0 10px 0; color:#00f2ff;">💬 채팅방</h3>
            <div id="chat-container"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="chat-input" placeholder="메시지..."><button onclick="window.sendChat()">전송</button></div>
        </div>
    </div>

    <div id="live-battle-modal" class="modal-overlay">
        <div class="modal-content" style="border:2px solid #ff006e;">
            <h2 style="margin-top:0; color:#ff006e;">⚔️ 전투 중계</h2>
            <div id="live-battle-log"></div>
            <button id="live-battle-close" style="width:100%; display:none;" onclick="window.closeLiveBattle()">결과 확인</button>
        </div>
    </div>

    <div id="gacha-modal" class="modal-overlay" onclick="window.closeModal('gacha-modal')">
        <h2 style="color:#fff;">🎉 획득! 🎉</h2>
        <div id="gacha-result-container"></div>
        <button onclick="window.closeModal('gacha-modal')" style="margin-top:15px;">닫기</button>
    </div>

    <div id="mailbox-modal" class="modal-overlay" onclick="window.closeModal('mailbox-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;">📬 우편함</h3>
                <button onclick="window.claimAllMails()" style="background:#ffea00; color:#000; font-size:0.8rem;">모두수령</button>
            </div>
            <div id="mail-list-container"></div>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
