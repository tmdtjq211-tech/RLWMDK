<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 카드 레이아웃 수정 예시</title>
    <style>
        /* 기본 스타일 초기화 */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        /* 캐릭터 카드 전체 컨테이너 */
        .card-container {
            width: 350px; /* 카드 너비 */
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: white;
            display: flex;
            flex-direction: column;
        }

        /* 이미지 영역 */
        .card-image-box {
            position: relative;
            width: 100%;
            padding-top: 133.33%; /* 3:4 비율 (선택 사항) */
            overflow: hidden;
            background-color: white;
        }

        /* 이미지 스타일 */
        .card-image-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 이미지 전체가 보이도록 설정 */
        }

        /* SSR 텍스트 스타일 */
        .ssr-grade-text {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 1.2rem;
            color: #ff3366; /* SSR 등급 색상 */
            font-weight: bold;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 하단 검은색 배경 정보 영역 */
        .card-info-box {
            background-color: #1a1a1a;
            color: white;
            padding: 25px 20px; /* 세로 padding을 충분히 주어 영역 확보 */
            display: flex;
            flex-direction: column;
            align-items: center; /* 가로 중앙 정렬 */
            justify-content: center; /* 세로 중앙 정렬 */
        }

        /* 닉네임 텍스트 */
        .player-nickname {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px; /* 능력치와의 여백 */
            text-align: center;
        }

        /* 능력치 텍스트 그룹 */
        .player-stats-group {
            display: flex;
            gap: 10px; /* 능력치 간의 여백 */
            font-size: 0.9rem;
            text-align: center;
        }

        /* 개별 능력치 스타일 */
        .player-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .player-stat.hp .stat-label { color: #26ff00; } /* HP 색상 */
        .player-stat.df .stat-label { color: #a0a0a0; } /* DF 색상 */
        .player-stat.at .stat-label { color: #ff3366; } /* AT 색상 */

        .stat-value {
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-image-box">
            <img src="https://i.ibb.co/3WqP4Xq/character-sample.png" alt="은발 궁수">
            
            <div class="ssr-grade-text">SSR</div>
        </div>

        <div class="card-info-box">
            <div class="player-nickname">
                은발의궁수 Lv.2
            </div>

            <div class="player-stats-group">
                <div class="player-stat hp">
                    <span class="stat-label">H:</span>
                    <span class="stat-value">8047</span>
                </div>
                <div class="player-stat df">
                    <span class="stat-label">D:</span>
                    <span class="stat-value">435</span>
                </div>
                <div class="player-stat at">
                    <span class="stat-label">A:</span>
                    <span class="stat-value">741</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
